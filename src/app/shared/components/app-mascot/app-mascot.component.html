<svg
  [class.password-focused]="passwordFocused()"
  class="mascot-svg"
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  [attr.width]="width()"
  [attr.height]="height()"
>
  <!-- Legs -->
  <rect class="mascot-leg" x="35" y="70" width="10" height="15" rx="3" fill="#a8dadc" />
  <rect class="mascot-leg" x="55" y="70" width="10" height="15" rx="3" fill="#a8dadc" />
  <!-- Body -->
  <rect class="mascot-body" x="30" y="45" width="40" height="30" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" />
  <!-- Head -->
  <rect class="mascot-head" x="25" y="20" width="50" height="35" rx="12" fill="#a8dadc" />
  <!-- Ears -->
  <rect class="mascot-ear left" x="18" y="22" width="10" height="25" rx="5" fill="#457b9d" />
  <rect class="mascot-ear right" x="72" y="22" width="10" height="25" rx="5" fill="#457b9d" />
  <!-- Eyes -->
  <g class="mascot-eyes">
    <!-- Normal Eyes -->
    <g class="normal-eyes">
      <circle cx="40" cy="33" r="4" fill="#1d3557" />
      <circle cx="60" cy="33" r="4" fill="#1d3557" />
      <circle cx="38" cy="31" r="1.2" fill="white" />
      <circle cx="58" cy="31" r="1.2" fill="white" />
    </g>
    <!-- Shy/Closed Eyes (shown on password focus) -->
    <g class="shy-eyes">
      <path d="M35 34 Q40 30 45 34" stroke="#1d3557" stroke-width="3" stroke-linecap="round" fill="none" />
      <path d="M55 34 Q60 30 65 34" stroke="#1d3557" stroke-width="3" stroke-linecap="round" fill="none" />
    </g>
  </g>
  <!-- Nose -->
  <polygon points="47,38 53,38 50,42" fill="#1d3557" />
  <!-- Mouth -->
  <path d="M47 44 Q50 46 53 44" stroke="#1d3557" stroke-width="2" stroke-linecap="round" fill="none" />
  <!-- Collar/Tag -->
  <rect x="38" y="52" width="24" height="4" rx="2" fill="#ff334d" />
  <circle cx="50" cy="58" r="3" fill="#fffc0e" />
  <!-- Toy block held by mascot -->
  <rect x="68" y="60" width="18" height="18" rx="4" fill="#08B880" />
  <rect x="71" y="63" width="12" height="12" rx="2" fill="#0bf0df" opacity="0.3" />
</svg>
