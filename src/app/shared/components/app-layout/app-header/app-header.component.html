<header class="header">
  <div class="header-container">
    <a href="/" class="logo">
      <div class="logo-mascot">
        <!-- ponytail: inline mascot SVG to avoid extra HTTP requests/assets -->
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Legs -->
          <rect x="35" y="70" width="10" height="15" rx="3" fill="#a8dadc" />
          <rect x="55" y="70" width="10" height="15" rx="3" fill="#a8dadc" />
          <!-- Body -->
          <rect x="30" y="45" width="40" height="30" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" />
          <!-- Head -->
          <rect x="25" y="20" width="50" height="35" rx="12" fill="#a8dadc" />
          <!-- Ears -->
          <rect x="18" y="22" width="10" height="25" rx="5" fill="#457b9d" />
          <rect x="72" y="22" width="10" height="25" rx="5" fill="#457b9d" />
          <!-- Eyes -->
          <circle cx="40" cy="33" r="4" fill="#1d3557" />
          <circle cx="60" cy="33" r="4" fill="#1d3557" />
          <circle cx="38" cy="31" r="1.2" fill="white" />
          <circle cx="58" cy="31" r="1.2" fill="white" />
          <!-- Nose -->
          <polygon points="47,38 53,38 50,42" fill="#1d3557" />
          <!-- Mouth -->
          <path d="M47 44 Q50 46 53 44" stroke="#1d3557" stroke-width="2" stroke-linecap="round" fill="none" />
          <!-- Collar/Tag -->
          <rect x="38" y="52" width="24" height="4" rx="2" fill="#ff334d" />
          <circle cx="50" cy="58" r="3" fill="#fffc0e" />
          <!-- Toy block held by mascot -->
          <rect x="68" y="60" width="18" height="18" rx="4" fill="#08B880" />
          <rect x="71" y="63" width="12" height="12" rx="2" fill="#0bf0df" opacity="0.3" />
        </svg>
      </div>
      <div class="logo-text-wrapper">
        <span class="logo-title">TETO TOYS</span>
        <span class="logo-tagline">Play. Create. Imagine.</span>
      </div>
    </a>

    <nav class="nav">
      <a href="/shop" class="nav-link active">Shop All</a>
      <a href="/new-arrivals" class="nav-link">New Arrivals</a>
      <a href="/ages" class="nav-link">Ages</a>
      <a href="/gifting" class="nav-link">Gifting</a>
      <a href="/blog" class="nav-link">Blog</a>
      <a href="/about" class="nav-link">About</a>
    </nav>

    <div class="header-actions">
      <!-- Search Icon -->
      <button class="action-btn" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.637 10.637z" />
        </svg>
      </button>

      <!-- Account Icon -->
      <button class="action-btn" aria-label="Account">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
      </button>

      <!-- Cart Icon -->
      <button class="action-btn cart-btn" aria-label="Shopping Cart">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
        </svg>
        <span class="cart-badge">1</span>
      </button>
    </div>
  </div>
</header>
