<header
  class="sticky top-0 z-[100] bg-[var(--bg-glass)] backdrop-blur-md border-b border-[var(--border-glass)] [transition:var(--transition-smooth)]"
>
  <div class="max-w-[1200px] mx-auto px-4 py-3 md:px-8 flex justify-between items-center">
    <a routerLink="/" class="group flex items-center gap-3 no-underline [transition:var(--transition-smooth)] hover:scale-[1.02]">
      <div
        class="w-[46px] h-[46px] flex items-center justify-center [transition:var(--transition-smooth)] group-hover:rotate-[-3deg] group-hover:scale-105"
      >
        <app-mascot width="46" height="46" />
      </div>
      <div class="flex flex-col justify-center">
        <span
          class="[font-family:var(--font-display)] text-[1.45rem] font-bold tracking-[-0.01em] text-[var(--text-accent)] leading-[1.1]"
        >TETO TOYS</span>
        <span
          class="[font-family:var(--font-family)] text-[0.68rem] font-semibold text-[#3b82f6] tracking-[0.04em] leading-[1.2] mt-px"
        >Play. Create. Imagine.</span>
      </div>
    </a>

    <nav
      id="mobile-nav"
      class="absolute md:static md:flex top-full inset-x-0 md:inset-x-auto flex-col md:flex-row items-stretch md:items-center gap-0 md:gap-7 bg-[var(--bg-primary)] md:bg-transparent border-b md:border-b-0 border-[var(--border-glass)] shadow-[0_8px_24px_rgba(0,0,0,0.08)] md:shadow-none px-4 md:px-0 pt-2 pb-4 md:py-0 z-[150] animate-[mobile-nav-in_0.15s_ease-out] md:animate-none"
      [class.hidden]="!mobileNavOpen()"
      [class.flex]="mobileNavOpen()"
    >
      <a
        routerLink="/landing"
        routerLinkActive="active"
        class="relative w-full md:w-auto py-3.5 md:py-2 px-2 md:px-0 text-[0.95rem] font-semibold text-[var(--text-secondary)] [font-family:var(--font-family)]
               hover:text-[var(--text-primary)]
               md:after:content-[''] md:after:absolute md:after:bottom-0 md:after:left-1/2 md:after:-translate-x-1/2 md:after:w-0 md:after:h-[3px] md:after:bg-[var(--brand-green)] md:after:rounded-full md:after:[transition:var(--transition-smooth)]
               md:hover:after:w-full
               [&.active]:text-[var(--text-accent)] md:[&.active]:after:w-[60%]"
        (click)="mobileNavOpen.set(false)"
      >Shop All</a>
      <a
        routerLink="/about"
        routerLinkActive="active"
        class="relative w-full md:w-auto py-3.5 md:py-2 px-2 md:px-0 text-[0.95rem] font-semibold text-[var(--text-secondary)] [font-family:var(--font-family)]
               hover:text-[var(--text-primary)]
               md:after:content-[''] md:after:absolute md:after:bottom-0 md:after:left-1/2 md:after:-translate-x-1/2 md:after:w-0 md:after:h-[3px] md:after:bg-[var(--brand-green)] md:after:rounded-full md:after:[transition:var(--transition-smooth)]
               md:hover:after:w-full
               [&.active]:text-[var(--text-accent)] md:[&.active]:after:w-[60%]"
        (click)="mobileNavOpen.set(false)"
      >About Us</a>
      <a
        routerLink="/contact"
        routerLinkActive="active"
        class="relative w-full md:w-auto py-3.5 md:py-2 px-2 md:px-0 text-[0.95rem] font-semibold text-[var(--text-secondary)] [font-family:var(--font-family)]
               hover:text-[var(--text-primary)]
               md:after:content-[''] md:after:absolute md:after:bottom-0 md:after:left-1/2 md:after:-translate-x-1/2 md:after:w-0 md:after:h-[3px] md:after:bg-[var(--brand-green)] md:after:rounded-full md:after:[transition:var(--transition-smooth)]
               md:hover:after:w-full
               [&.active]:text-[var(--text-accent)] md:[&.active]:after:w-[60%]"
        (click)="mobileNavOpen.set(false)"
      >Contact Us</a>
    </nav>

    <div class="flex items-center gap-3">
      <!-- Mobile nav toggle: only rendered/visible below the nav-collapse breakpoint -->
      <button
        id="mobile-nav-toggle"
        class="order-[-1] flex md:hidden size-10 pointer-coarse:size-11 rounded-full border-0 bg-transparent text-[var(--text-secondary)] items-center justify-center cursor-pointer [transition:var(--transition-smooth)]
               hover:bg-[var(--bg-tertiary)] hover:text-[var(--text-primary)]
               aria-expanded:bg-[var(--bg-tertiary)] aria-expanded:text-[var(--text-accent)]"
        type="button"
        (click)="toggleMobileNav()"
        [attr.aria-expanded]="mobileNavOpen()"
        aria-controls="mobile-nav"
        aria-label="Toggle navigation menu"
      >
        @if (mobileNavOpen()) {
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="size-[22px] [stroke-width:2.2]" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="size-[22px] [stroke-width:2.2]" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" />
          </svg>
        }
      </button>

      <!-- Language selector: drives translated content + RTL/LTR layout direction -->
      @if (languageService.languages().length > 0) {
        <select
          class="h-10 pointer-coarse:h-11 px-2 rounded-full border-[1.5px] border-[var(--border-glass)] bg-[var(--bg-secondary)] text-sm font-semibold text-[var(--text-primary)] [font-family:var(--font-family)] cursor-pointer [transition:var(--transition-smooth)]
                 hover:border-[var(--brand-green)] focus:border-[var(--brand-green)] focus:outline-none"
          [value]="languageService.current()"
          (change)="languageService.setLanguage($any($event.target).value)"
          aria-label="Select language"
        >
          @for (l of languageService.languages(); track l.code) {
            <option [value]="l.code">{{ l.name }}</option>
          }
        </select>
      }

      <!-- Search Icon: search only lives on the catalog page today -->
      <a
        routerLink="/landing"
        class="relative size-10 pointer-coarse:size-11 rounded-full bg-transparent text-[var(--text-secondary)] flex items-center justify-center cursor-pointer [transition:var(--transition-smooth)]
               hover:bg-[var(--bg-tertiary)] hover:text-[var(--text-primary)] hover:-translate-y-px active:translate-y-0"
        aria-label="Search products"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          class="size-[22px] [stroke-width:2.2]"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.637 10.637z"
          />
        </svg>
      </a>

      <!-- User Menu -->
      @if (authService.isAuthenticated()) {
        <div id="user-menu-wrapper" class="relative">
          <button
            class="flex items-center gap-2 pl-2 pr-3 py-1.5 rounded-full border-[1.5px] border-[var(--border-glass)] bg-[var(--bg-secondary)] cursor-pointer [transition:var(--transition-smooth)] [font-family:var(--font-family)] text-[var(--text-primary)]
                   hover:bg-[var(--bg-tertiary)] hover:border-[var(--brand-green)]
                   [&.open]:bg-[var(--bg-tertiary)] [&.open]:border-[var(--brand-green)]"
            (click)="toggleMenu()"
            [class.open]="menuOpen()"
            aria-label="User menu"
            id="user-menu-trigger"
          >
            <span
              class="size-7 rounded-full bg-linear-to-br from-[var(--brand-green)] to-[#22c55e] flex items-center justify-center shrink-0"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                class="size-4 stroke-white [stroke-width:2.2]"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
                />
              </svg>
            </span>
            <span class="text-sm font-semibold text-[var(--text-primary)] max-w-[120px] truncate">{{ authService.username() || 'Account' }}</span>
            <span
              class="flex items-center transition-transform duration-200 [&.rotated]:rotate-180"
              [class.rotated]="menuOpen()"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                class="size-3.5 text-[var(--text-secondary)] [stroke-width:2.5]"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M19.5 8.25l-7.5 7.5-7.5-7.5"
                />
              </svg>
            </span>
          </button>

          @if (menuOpen()) {
            <div
              class="absolute top-[calc(100%+10px)] right-0 min-w-[200px] bg-[var(--bg-primary)] border border-[var(--border-glass)] rounded-[14px] shadow-[0_8px_32px_rgba(0,0,0,0.12),0_2px_8px_rgba(0,0,0,0.08)] z-[200] overflow-hidden animate-[dropdown-in_0.15s_ease-out]"
              role="menu"
            >
              <div class="pt-3.5 px-4 pb-3">
                <p class="text-[0.8rem] text-[var(--text-secondary)] font-medium m-0 truncate">{{ authService.username() }}</p>
              </div>
              <div class="h-px bg-[var(--border-glass)] m-0"></div>
              <a
                routerLink="/profile"
                class="group flex items-center gap-2.5 px-4 py-3 text-[0.9rem] font-medium [font-family:var(--font-family)] text-[var(--text-primary)] no-underline cursor-pointer border-0 bg-transparent w-full text-left transition-[background,color] duration-150 ease-in-out
                       hover:bg-[var(--bg-secondary)] hover:text-[var(--brand-green)]"
                (click)="menuOpen.set(false)"
                role="menuitem"
                id="menu-profile"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  class="size-[18px] shrink-0 text-[var(--text-secondary)] transition-colors duration-150 group-hover:text-[var(--brand-green)]"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                </svg>
                Profile
              </a>
              <a
                routerLink="/favorites"
                class="group flex items-center gap-2.5 px-4 py-3 text-[0.9rem] font-medium [font-family:var(--font-family)] text-[var(--text-primary)] no-underline cursor-pointer border-0 bg-transparent w-full text-left transition-[background,color] duration-150 ease-in-out
                       hover:bg-[var(--bg-secondary)] hover:text-[var(--brand-green)]"
                (click)="menuOpen.set(false)"
                role="menuitem"
                id="menu-favorites"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  class="size-[18px] shrink-0 text-[var(--text-secondary)] transition-colors duration-150 group-hover:text-[var(--brand-green)]"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"
                  />
                </svg>
                Favorites
              </a>
              <div class="h-px bg-[var(--border-glass)] m-0"></div>
              <button
                class="group flex items-center gap-2.5 px-4 py-3 text-[0.9rem] font-medium [font-family:var(--font-family)] text-[var(--text-primary)] cursor-pointer border-0 bg-transparent w-full text-left transition-[background,color] duration-150 ease-in-out
                       hover:bg-[rgba(239,68,68,0.07)] hover:text-[#ef4444]"
                (click)="logout()"
                role="menuitem"
                id="menu-logout"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  class="size-[18px] shrink-0 text-[var(--text-secondary)] transition-colors duration-150 group-hover:text-[#ef4444]"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"
                  />
                </svg>
                Logout
              </button>
            </div>
          }
        </div>
      } @else {
        <a
          routerLink="/login"
          class="relative size-10 pointer-coarse:size-11 rounded-full bg-transparent text-[var(--text-secondary)] flex items-center justify-center cursor-pointer [transition:var(--transition-smooth)]
                 hover:bg-[var(--bg-tertiary)] hover:text-[var(--text-primary)] hover:-translate-y-px active:translate-y-0"
          aria-label="Account"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            class="size-[22px] [stroke-width:2.2]"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
            />
          </svg>
        </a>
      }
    </div>
  </div>
</header>
