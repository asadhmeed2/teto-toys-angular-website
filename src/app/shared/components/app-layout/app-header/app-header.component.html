<header class="header">
  <div class="header-container">
    <a routerLink="/" class="logo">
      <div class="logo-mascot">
        <app-mascot width="46" height="46" />
      </div>
      <div class="logo-text-wrapper">
        <span class="logo-title">TETO TOYS</span>
        <span class="logo-tagline">Play. Create. Imagine.</span>
      </div>
    </a>

    <nav class="nav">
      <a routerLink="/shop" class="nav-link active">Shop All</a>
      <a routerLink="/new-arrivals" class="nav-link">New Arrivals</a>
      <a routerLink="/ages" class="nav-link">Ages</a>
      <a routerLink="/gifting" class="nav-link">Gifting</a>
      <a routerLink="/blog" class="nav-link">Blog</a>
      <a routerLink="/about" class="nav-link">About</a>
    </nav>

    <div class="header-actions">
      <!-- Search Icon -->
      <button class="action-btn" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.637 10.637z" />
        </svg>
      </button>

      <!-- User Menu -->
      @if (authService.isAuthenticated()) {
      <div class="user-menu-wrapper">
        <button class="user-menu-trigger" (click)="toggleMenu()" [class.open]="menuOpen()" aria-label="User menu" id="user-menu-trigger">
          <span class="user-avatar">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
          </span>
          <span class="user-name">{{ authService.username() || 'Account' }}</span>
          <span class="chevron" [class.rotated]="menuOpen()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
          </span>
        </button>

        @if (menuOpen()) {
        <div class="user-dropdown" role="menu">
          <div class="dropdown-header">
            <p class="dropdown-email">{{ authService.username() }}</p>
          </div>
          <div class="dropdown-divider"></div>
          <a routerLink="/profile" class="dropdown-item" (click)="menuOpen.set(false)" role="menuitem" id="menu-profile">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            Profile
          </a>
          <a routerLink="/favourites" class="dropdown-item" (click)="menuOpen.set(false)" role="menuitem" id="menu-favourites">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
            </svg>
            Favourites
          </a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item logout-item" (click)="logout()" role="menuitem" id="menu-logout">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
            </svg>
            Logout
          </button>
        </div>
        }
      </div>
      } @else {
      <a routerLink="/login" class="action-btn" aria-label="Account">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
      </a>
      }

      <!-- Cart Icon -->
      <button class="action-btn cart-btn" aria-label="Shopping Cart">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
        </svg>
        <span class="cart-badge">1</span>
      </button>
    </div>
  </div>
</header>
