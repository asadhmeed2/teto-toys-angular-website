<div class="landing-container">
  <!-- Hero Section -->
  <header class="hero-section">
    <div class="hero-content">
      <h1 class="hero-title">Welcome to <span class="accent-text">Teto Toys</span></h1>
      <p class="hero-subtitle">Discover premium, high-quality customizable toys and parts.</p>
    </div>
  </header>

  <!-- Products Section -->
  <section class="main-content">
    <div class="section-header">
      <h2 class="section-title">Featured Products</h2>
    </div>

    <!-- Controls Section: Tabs & Search -->
    <div class="controls-row">
      <div class="categories-tabs" role="tablist" aria-label="Product categories">
        <button
          class="tab-btn"
          role="tab"
          [attr.aria-selected]="selectedCategory() === 'All'"
          [class.active]="selectedCategory() === 'All'"
          (click)="selectCategory('All')"
        >
          All
        </button>
        @for (cat of categories(); track cat.id) {
          <button
            class="tab-btn"
            role="tab"
            [attr.aria-selected]="selectedCategory() === cat.id.toString()"
            [class.active]="selectedCategory() === cat.id.toString()"
            (click)="selectCategory(cat.id.toString())"
          >
            {{ cat.name }}
          </button>
        }
      </div>

      <div class="search-wrapper">
        <svg
          class="search-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          type="text"
          class="search-input"
          placeholder="Search products by title..."
          [value]="searchQuery()"
          (keyup)="onSearchKeyup($event)"
        />
      </div>
    </div>

    <app-products-cards-list
      [products]="products()"
      [categoryMap]="categoryMap()"
      [favoriteIds]="favoriteIds()"
      [togglingFavoriteId]="togglingFavoriteId()"
      [isAuthenticated]="authService.isAuthenticated()"
      [isLoading]="isLoading()"
      [errorMessage]="errorMessage()"
      (viewDetails)="viewDetails($event)"
      (toggleFavorite)="toggleFavorite($event)"
      (retry)="loadProducts()"
    />
  </section>
</div>
